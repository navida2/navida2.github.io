<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Navid Atashbar</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0c0c0e;
      --surface: #141416;
      --border: #222226;
      --text: #e8e6e0;
      --muted: #6b6b72;
      --accent: #c8f06e;
      --serif: 'DM Serif Display', Georgia, serif;
      --mono: 'DM Mono', 'Courier New', monospace;
    }

    body {
      background: var(--bg);
      min-height: 100vh;
      font-family: var(--mono);
    }

    /* grid stays fixed behind everything */
    .grid-bg {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(200,240,110,0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(200,240,110,0.07) 1px, transparent 1px);
      background-size: 60px 60px;
      pointer-events: none;
    }

    /* navbar sits on top of everything and stays fixed while u scroll */
    nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      z-index: 100;
      padding: 20px 0;
      transition: background 0.3s ease, border-bottom 0.3s ease;
    }

    /* this class gets added by js when u scroll down - gives it that frosted look */
    nav.scrolled {
      background: rgba(12,12,14,0.95);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(8px);
    }

    /* just centering everything and keeping max width consistent */
    .nav-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    /* logo on the left */
    .nav-logo {
      font-family: var(--serif);
      font-size: 20px;
      color: var(--text);
      text-decoration: none;
      letter-spacing: -0.5px;
      transition: color 0.2s;
    }

    .nav-logo:hover { color: var(--accent); }

    /* the green part of the logo */
    .nav-logo span { color: var(--accent); }

    /* the links on the right */
    .nav-links {
      display: flex;
      gap: 36px;
      align-items: center;
    }

    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      position: relative;
      transition: color 0.2s;
    }

    /* this is the underline that slides in on hover - looks clean */
    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: -3px; left: 0;
      width: 0; height: 1px;
      background: var(--accent);
      transition: width 0.25s ease;
    }

    .nav-links a:hover { color: var(--accent); }
    .nav-links a:hover::after { width: 100%; }

    /* contact is styled different so recruiters notice it */
    .nav-cta {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 18px;
      background: transparent;
      border: 1px solid rgba(200,240,110,0.4);
      color: var(--accent) !important;
      border-radius: 2px;
      font-size: 11px !important;
      letter-spacing: 0.1em !important;
      transition: all 0.2s ease !important;
    }

    /* slight green glow on hover */
    .nav-cta:hover {
      background: rgba(200,240,110,0.08) !important;
      border-color: var(--accent) !important;
    }

    /* turn off the underline animation for the cta button */
    .nav-cta::after { display: none !important; }

    /* hamburger icon for mobile - hidden on desktop */
    .nav-hamburger {
      display: none;
      flex-direction: column;
      gap: 5px;
      cursor: pointer;
      padding: 4px;
    }

    .nav-hamburger span {
      display: block;
      width: 22px; height: 1px;
      background: var(--muted);
      transition: all 0.3s ease;
    }

    /* hide links and show hamburger on small screens */
    @media (max-width: 640px) {
      .nav-links { display: none; }
      .nav-hamburger { display: flex; }
    }

    /* hero takes up the full first screen */
    .hero {
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding-top: 80px;
      position: relative;
      z-index: 1;
    }

    .hero-container {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 32px;
      width: 100%;
    }

    /* little pill tag above the name */
    .hero-tag {
      display: inline-block;
      background: rgba(200,240,110,0.08);
      border: 1px solid rgba(200,240,110,0.2);
      color: var(--accent);
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 4px 12px;
      border-radius: 2px;
      margin-bottom: 32px;
      animation: fadeUp 0.6s ease both;
    }

    /* the big name */
    .hero h1 {
      font-family: var(--serif);
      font-size: clamp(52px, 8vw, 96px);
      line-height: 0.95;
      letter-spacing: -2px;
      color: var(--text);
      margin-bottom: 24px;
      animation: fadeUp 0.6s 0.1s ease both;
    }

    /* the italic green part of the name */
    .hero h1 em {
      font-style: italic;
      color: var(--accent);
      display: block;
    }

    /* the one liner */
    .hero-oneliner {
      font-size: 14px;
      color: var(--muted);
      letter-spacing: 0.05em;
      margin-bottom: 48px;
      animation: fadeUp 0.6s 0.2s ease both;
    }

    .hero-oneliner span {
      color: var(--text);
    }

    /* github linkedin email buttons */
    .hero-links {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      animation: fadeUp 0.6s 0.3s ease both;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      border-radius: 2px;
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.05em;
      text-decoration: none;
      transition: all 0.2s ease;
    }

    /* solid green button - for the main cta */
    .btn-primary {
      background: var(--accent);
      color: #0c0c0e;
      font-weight: 500;
    }

    .btn-primary:hover {
      background: #d8ff7e;
      transform: translateY(-2px);
    }

    /* outlined button - for secondary links */
    .btn-outline {
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
    }

    .btn-outline:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-2px);
    }

    /* stat row at the bottom of the hero */
    .hero-stats {
      display: flex;
      gap: 48px;
      margin-top: 80px;
      padding-top: 40px;
      border-top: 1px solid var(--border);
      flex-wrap: wrap;
      animation: fadeUp 0.6s 0.4s ease both;
    }

    .stat-num {
      font-family: var(--serif);
      font-size: 36px;
      color: var(--accent);
      display: block;
      letter-spacing: -1px;
    }

    .stat-label {
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* the fade up animation used throughout the hero */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 640px) {
      .hero-stats { gap: 28px; }
    }
  </style>
</head>
<body>

  <!-- grid and nav are siblings, not nested -->
  <div class="grid-bg"></div>

  <nav id="navbar">
    <div class="nav-container">
      <a href="#" class="nav-logo">Navid <span>Atashbar</span></a>
      <div class="nav-links">
        <a href="#about">About</a>
        <a href="#projects">Projects</a>
        <a href="#education">Education</a>
        <!-- contact styled as a button so it pops -->
        <a href="#contact" class="nav-cta">Contact ↗</a>
      </div>
      <!-- only shows on mobile -->
      <div class="nav-hamburger">
        <span></span><span></span><span></span>
      </div>
    </div>
  </nav>

  <section class="hero">
    <div class="hero-container">

      <!-- small tag - swap text if u want -->
      <div class="hero-tag">>Honors CS · UCI</div>

      <!-- ur name - the italic part drops to its own line -->
      <h1>Navid<br><em>Atashbar.</em></h1>

      <!-- one liner -->
      <p class="hero-oneliner">
        <span>CS Student @ UCI</span> · ML & Computer Vision
      </p>

      <div class="hero-links">
        <a href="https://github.com/navida2" target="_blank" class="btn btn-primary">GitHub ↗</a>
        <a href="https://linkedin.com/in/navid-atashbar" target="_blank" class="btn btn-outline">LinkedIn ↗</a>
        <a href="mailto:atashbar@uci.edu" class="btn btn-outline">Email ↗</a>
      </div>

      <!-- quick stats so recruiters see the highlights fast
      <div class="hero-stats">
        <div>
          <span class="stat-num">3.63</span>
          <span class="stat-label">GPA at UCI</span>
        </div>
        <div>
          <span class="stat-num">5×</span>
          <span class="stat-label">Dean's Honor List</span>
        </div>
        <div>
          <span class="stat-num">3+</span>
          <span class="stat-label">Projects shipped</span>
        </div>
      </div> -->

    </div>
  </section>

  <!-- script goes here so the navbar element exists before js runs -->
  <script>
    const navbar = document.getElementById('navbar');
    window.addEventListener('scroll', () => {
      navbar.classList.toggle('scrolled', window.scrollY > 20);
    });
  </script>

</body>
</html>
